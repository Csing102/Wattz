<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cinematic Animation Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: -apple-system, system-ui, sans-serif; color: #e0e0e0; }
        
        #app-layout { display: flex; width: 100vw; height: 100vh; flex-direction: column; }
        #workspace { display: flex; flex: 1; min-height: 0; position: relative; }
        #canvas-container { flex: 1; height: 100%; background: #000; position: relative; }
        
        /* Glassmorphism Sidebar panels */
        #sidebar { width: 340px; background: #252526; border-right: 1px solid #3c3c3c; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; border-bottom: 1px solid #3c3c3c; padding-bottom: 6px; margin-bottom: 10px; }
        
        .panel-section { background: #1e1e1e; padding: 12px; border-radius: 6px; border: 1px solid #333; }
        .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .control-row:last-child { margin-bottom: 0; }
        
        input, select, button { background: #333; color: #fff; border: 1px solid #555; padding: 6px 10px; border-radius: 4px; font-size: 12px; }
        input[type="number"] { width: 70px; }
        input[type="range"] { width: 120px; accent-color: #007acc; }
        select, input[type="text"] { width: 180px; }
        button { background: #007acc; border: none; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        button:hover { background: #0098ff; }
        button.secondary { background: #444; }
        button.secondary:hover { background: #555; }
        button.danger { background: #a93226; }
        button.danger:hover { background: #cb4335; }
        
        /* Timeline Dock Styles */
        #timeline-dock { height: 140px; background: #252526; border-top: 1px solid #3c3c3c; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        #timeline-track-container { position: relative; width: 100%; height: 40px; background: #1e1e1e; border: 1px solid #3c3c3c; border-radius: 4px; cursor: pointer; }
        #timeline-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #007acc; pointer-events: none; }
        .kf-marker { position: absolute; top: 50%; width: 10px; height: 10px; background: #ffcc00; transform: translate(-50%, -50%) rotate(45deg); border: 1px solid #111; cursor: pointer; }
        .kf-marker.active { background: #00ffff; box-shadow: 0 0 8px #00ffff; }
        
        .timeline-bar-actions { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
        .flex-gap { display: flex; gap: 8px; }
        
        /* Overlay UI Utilities */
        #view-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; letter-spacing: 1px; border: 1px solid #444; pointer-events: none; z-index: 5; }
        #gizmo-hint { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 4px; font-size: 11px; color: #aaa; z-index: 5; border: 1px solid #444; }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="app-layout">
        <div id="workspace">
            <div id="sidebar">
                <div class="panel-section">
                    <h3>Asset URL Loader</h3>
                    <div class="control-row" style="flex-direction:column; align-items:stretch; gap:6px;">
                        <input type="text" id="asset-url" value="https://raw.githubusercontent.com/Csing102/Wattz/refs/heads/main/scene.gltf" placeholder="Paste .gltf/.glb link...">
                        <button id="btn-load-asset">Load Model</button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>Viewport Architecture</h3>
                    <div class="control-row">
                        <label>Camera View</label>
                        <select id="select-view">
                            <option value="freeroam">Free Roam Editor View</option>
                            <option value="cinematic">Jump Into Cinematic Camera</option>
                        </select>
                    </div>
                    <div class="control-row">
                        <label>Blender Gizmo Target</label>
                        <select id="select-gizmo-target">
                            <option value="camera">Cinematic Camera Object</option>
                            <option value="model">Loaded Car Model Mesh</option>
                        </select>
                    </div>
                    <div class="control-row">
                        <label>Gizmo Mode</label>
                        <select id="select-gizmo-mode">
                            <option value="translate">Move (G)</option>
                            <option value="rotate">Rotate (R)</option>
                            <option value="scale">Scale (S)</option>
                        </select>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>Studio Lighting Config</h3>
                    <div class="control-row">
                        <label>Studio Brightness</label>
                        <input type="range" id="light-intensity" min="0" max="6" step="0.1" value="3">
                    </div>
                    <div class="control-row">
                        <label>Rim Light Accent</label>
                        <input type="color" id="light-color" value="#ffffff">
                    </div>
                    <div class="control-row">
                        <label>Studio Background</label>
                        <input type="color" id="bg-color" value="#ffffff">
                    </div>
                </div>
            </div>

            <div id="canvas-container">
                <div id="view-badge">VIEW: FREE ROAM</div>
                <div id="gizmo-hint">Gizmo hotkeys: W (Move) | E (Rotate) | R (Scale) | Q (Detach)</div>
            </div>
        </div>

        <div id="timeline-dock">
            <div class="timeline-bar-actions">
                <div class="flex-gap" style="align-items:center;">
                    <button id="btn-toggle-play">Play</button>
                    <span id="label-time-counter" style="font-variant-numeric: tabular-nums; font-weight:bold;">Frame: 0.0s / 10.0s</span>
                </div>
                <div class="flex-gap">
                    <button id="btn-add-kf" style="background:#28b463;">Add/Edit Keyframe</button>
                    <button id="btn-del-kf" class="danger">Delete Keyframe</button>
                </div>
            </div>
            <div id="timeline-track-container">
                <div id="timeline-playhead"></div>
                </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Core Engine Architecture Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        // View 1: The Interactive workspace view editor
        const freeCam = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
        freeCam.position.set(8, 6, 12);

        // View 2: The actual runtime playback camera object visible inside the room
        const cinCam = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 500);
        cinCam.position.set(0, 2, 6);
        scene.add(cinCam);

        // Visual helper mesh representing the cinema camera in Free Roam mode
        const camHelper = new THREE.CameraHelper(cinCam);
        scene.add(camHelper);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- Viewport Navigation Controllers ---
        const orbitControls = new OrbitControls(freeCam, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;

        const transformControls = new TransformControls(freeCam, renderer.domElement);
        scene.add(transformControls);

        // Prevent OrbitControls from interfering when dragging the Blender transformation handle lines
        transformControls.addEventListener('dragging-changed', (event) => {
            orbitControls.enabled = !event.value;
        });

        // --- Environment Lighting Layout ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const studioLight = new THREE.DirectionalLight(0xffffff, 3.0);
        studioLight.position.set(5, 15, 5);
        studioLight.castShadow = true;
        scene.add(studioLight);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const grid = new THREE.GridHelper(50, 50, 0xcccccc, 0xeeeeee);
        grid.position.y = 0.001;
        scene.add(grid);

        // --- Model Manager State ---
        let loadedModel = null;
        const gltfLoader = new GLTFLoader();

        function loadModelFromURL(url) {
            if (loadedModel) scene.remove(loadedModel);
            gltfLoader.load(url, (gltf) => {
                loadedModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(loadedModel);
                const center = box.getCenter(new THREE.Vector3());
                loadedModel.position.set(-center.x, -box.min.y, -center.z); // Snaps mesh directly onto ground plane
                scene.add(loadedModel);
                
                // Set default gizmo focus target to the new model mesh
                document.getElementById('select-gizmo-target').value = "model";
                transformControls.attach(loadedModel);
            }, undefined, (err) => alert("Failed to interpret asset model path or format. Confirm CORS configurations."));
        }
        // Load initial default asset
        loadModelFromURL(document.getElementById('asset-url').value);

        // --- Unified Keyframe Animation System State ---
        let keyframes = [
            { time: 0, px: 0, py: 2, pz: 6, rx: 0, ry: 0, rz: 0 },
            { time: 5, px: 4, py: 1, pz: 3, rx: 0, ry: 1.2, rz: 0 },
            { time: 10, px: 0, py: 1.5, pz: -5, rx: 0, ry: 3.14, rz: 0 }
        ];
        
        let currentTime = 0;
        const maxDuration = 10; // Total track duration bounds (10 seconds)
        let isPlaying = false;
        const clock = new THREE.Clock();

        // --- Interactive Timeline Functionality ---
        const trackContainer = document.getElementById('timeline-track-container');
        const playhead = document.getElementById('timeline-playhead');

        function setTimelinePosition(time) {
            currentTime = Math.max(0, Math.min(maxDuration, time));
            const percentage = (currentTime / maxDuration) * 100;
            playhead.style.left = `${percentage}%`;
            document.getElementById('label-time-counter').innerText = `Frame: ${currentTime.toFixed(1)}s / ${maxDuration.toFixed(1)}s`;
            
            // Interpolate tracking data properties across timeline parameters if playing or scrubbing
            const state = evaluateInterpolation(currentTime);
            if (state) {
                cinCam.position.set(state.px, state.py, state.pz);
                cinCam.rotation.set(state.rx, state.ry, state.rz);
            }
            renderKeyframeMarkers();
        }

        trackContainer.addEventListener('mousedown', (e) => {
            const rect = trackContainer.getBoundingClientRect();
            const clickPos = (e.clientX - rect.left) / rect.width;
            setTimelinePosition(clickPos * maxDuration);
        });

        function renderKeyframeMarkers() {
            // Clear existing timeline markers
            const currentMarkers = trackContainer.querySelectorAll('.kf-marker');
            currentMarkers.forEach(m => m.remove());

            keyframes.forEach(kf => {
                const marker = document.createElement('div');
                marker.className = `kf-marker ${Math.abs(kf.time - currentTime) < 0.05 ? 'active' : ''}`;
                marker.style.left = `${(kf.time / maxDuration) * 100}%`;
                
                marker.addEventListener('click', (e) => {
                    e.stopPropagation(); // Avoid parsing secondary wrapper click triggers
                    setTimelinePosition(kf.time);
                });
                trackContainer.appendChild(marker);
            });
        }

        // --- Hermite Spline Matrix Trajectory Interpolation Math ---
        function evaluateInterpolation(t) {
            if (keyframes.length === 0) return null;
            keyframes.sort((a,b) => a.time - b.time);

            if (t <= keyframes[0].time) return keyframes[0];
            if (t >= keyframes[keyframes.length - 1].time) return keyframes[keyframes.length - 1];

            let i = 0;
            while (i < keyframes.length - 1 && keyframes[i+1].time < t) i++;

            const k1 = keyframes[i];
            const k2 = keyframes[i+1];
            const alpha = (t - k1.time) / (k2.time - k1.time);
            
            // Bezier easing factor calculation
            const smoothStep = alpha * alpha * (3 - 2 * alpha);

            return {
                px: THREE.MathUtils.lerp(k1.px, k2.px, smoothStep),
                py: THREE.MathUtils.lerp(k1.py, k2.py, smoothStep),
                pz: THREE.MathUtils.lerp(k1.pz, k2.pz, smoothStep),
                rx: THREE.MathUtils.lerp(k1.rx, k2.rx, smoothStep),
                ry: THREE.MathUtils.lerp(k1.ry, k2.ry, smoothStep),
                rz: THREE.MathUtils.lerp(k1.rz, k2.rz, smoothStep)
            };
        }

        // --- UI Action Bindings ---
        document.getElementById('btn-load-asset').addEventListener('click', () => {
            loadModelFromURL(document.getElementById('asset-url').value);
        });

        document.getElementById('btn-add-kf').addEventListener('click', () => {
            // Overwrite existing keyframe configuration matching current timeline mark
            keyframes = keyframes.filter(k => Math.abs(k.time - currentTime) > 0.05);
            keyframes.push({
                time: currentTime,
                px: cinCam.position.x, py: cinCam.position.y, pz: cinCam.position.z,
                rx: cinCam.rotation.x, ry: cinCam.rotation.y, rz: cinCam.rotation.z
            });
            setTimelinePosition(currentTime);
        });

        document.getElementById('btn-del-kf').addEventListener('click', () => {
            keyframes = keyframes.filter(k => Math.abs(k.time - currentTime) > 0.05);
            setTimelinePosition(currentTime);
        });

        const playBtn = document.getElementById('btn-toggle-play');
        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.innerText = isPlaying ? "Pause" : "Play";
        });

        // --- Gizmo Target and View Adjustment Engine ---
        const viewSelector = document.getElementById('select-view');
        viewSelector.addEventListener('change', (e) => {
            const mode = e.target.value;
            document.getElementById('view-badge').innerText = `VIEW: ${mode.toUpperCase()}`;
            if(mode === 'cinematic') transformControls.detach(); // Hide editing handles when viewing scene inside camera mode
        });

        const targetSelector = document.getElementById('select-gizmo-target');
        function updateGizmoTarget() {
            if (viewSelector.value === 'cinematic') return;
            if (targetSelector.value === 'camera') transformControls.attach(cinCam);
            else if (targetSelector.value === 'model' && loadedModel) transformControls.attach(loadedModel);
        }
        targetSelector.addEventListener('change', updateGizmoTarget);
        
        // Listen to Transform Control operations to synchronize keyframes on interaction
        transformControls.addEventListener('objectChange', () => {
            camHelper.update();
        });

        const modeSelector = document.getElementById('select-gizmo-mode');
        modeSelector.addEventListener('change', (e) => {
            transformControls.setMode(e.target.value);
        });

        // Keyboard Shortcut Mappings (Matches Blender workflow defaults)
        window.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'w': transformControls.setMode('translate'); modeSelector.value = 'translate'; break;
                case 'e': transformControls.setMode('rotate'); modeSelector.value = 'rotate'; break;
                case 'r': transformControls.setMode('scale'); modeSelector.value = 'scale'; break;
                case 'q': transformControls.detach(); break;
            }
        });

        // Live Environment Control Binding Setup
        document.getElementById('light-intensity').addEventListener('input', (e) => studioLight.intensity = parseFloat(e.target.value));
        document.getElementById('light-color').addEventListener('input', (e) => studioLight.color.set(e.target.value));
        document.getElementById('bg-color').addEventListener('input', (e) => {
            scene.background.set(e.target.value);
            floor.material.color.set(e.target.value);
        });

        // --- Continuous Render Loop execution ---
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            if (isPlaying) {
                let nextTime = currentTime + delta;
                if (nextTime > maxDuration) nextTime = 0; // Seamless looping tracking
                setTimelinePosition(nextTime);
            }

            orbitControls.update();
            camHelper.update();

            // Render based on selected camera viewpoint
            const activeCamera = (viewSelector.value === 'cinematic') ? cinCam : freeCam;
            renderer.render(scene, activeCamera);
        }

        // Initialize display environment values
        setTimelinePosition(0);
        updateGizmoTarget();
        animate();
    </script>
</body>
</html>
