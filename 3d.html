<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Car Edit Camera Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* Subtitle watermark to match the vibe */
        #ui-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 14px;
            opacity: 0.7;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        /* Quick Loading Screen */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 18px;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="loader">LOADING ASSETS...</div>
    <div id="canvas-container"></div>
    <div id="ui-overlay">// BEAT DROP EDIT //</div>

    <script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';

// 1. Scene Setup: A minimal, stark white room
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff); // Pure white background
scene.fog = new THREE.Fog(0xffffff, 1, 50); // Optional fog for scale depth

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// 2. Lighting (Crucial for a "white room")
const ambientLight = new THREE.AmbientLight(0xffffff, 0.2); // Soft overall fill
scene.add(ambientLight);

// Key light for defining shapes
const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
keyLight.position.set(5, 10, 5);
scene.add(keyLight);

// Contre-jour lighting to lift the car off the background
const backLight = new THREE.DirectionalLight(0xffffff, 1.5);
backLight.position.set(-5, 5, -5);
scene.add(backLight);

// Visual ground reference (subtle grid)
const gridHelper = new THREE.GridHelper(30, 30, 0xaaaaaa, 0xdddddd);
gridHelper.position.y = -0.01; // Slightly below zero to avoid z-fighting
scene.add(gridHelper);

// 3. Load Your Car Model (scene.gltf)
const loader = new GLTFLoader();
const modelUrl = 'https://raw.githubusercontent.com/Csing102/Wattz/refs/heads/main/scene.gltf';
let carModel = null;
const animationMixer = null;

loader.load(modelUrl, (gltf) => {
    carModel = gltf.scene;

    // A. Setup Shadow Casting (Optional but enhances realism)
    carModel.traverse((node) => {
        if (node.isMesh) {
            node.castShadow = true;
            node.receiveShadow = true;
        }
    });

    // B. Correct Model Position (Ensure it is on the ground)
    const box = new THREE.Box3().setFromObject(carModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    carModel.position.set(-center.x, -box.min.y, -center.z); // Center horizontally, put bottom at y=0

    scene.add(carModel);

    // C. Define and Initialize the Camera Animation
    setupCameraAnimation();
});

// 4. Create the Camera Path Animation Clip
function setupCameraAnimation() {
    // Defines *where* the camera is. 
    // Format: [TimeInSeconds, posX, posY, posZ, TimeInSeconds, posX, posY, posZ, ...]
    // Times are cumulative.
    const positionTrack = new THREE.KeyframeTrack('.position', [
        0.0, 0, 5, 12,    // START: Wide, high angle
        3.0, 0, 1.5, 4,   // 1. Zoom in: Closer, lower front
        4.0, 0, 1.0, 2.8, // Hold on Bonnet (slight advance)
        7.0, -8, 0.8, 1,  // 2. Left Side
        10.0, 8, 0.8, 1,  // 3. Right Side
        13.0, 0, 1.2, -6, // 4. Back (centered)
        16.0, -2, 0.8, -5.5, // 5. Left Back Side
        19.0, 2, 0.8, -5.5,  // 6. Right Back Side
        22.0, 0, 5, 12    // LOOP back to start
    ], [
        0, 5, 12,
        0, 1.5, 4,
        0, 1.0, 2.8,
        -8, 0.8, 1,
        8, 0.8, 1,
        0, 1.2, -6,
        -2, 0.8, -5.5,
        2, 0.8, -5.5,
        0, 5, 12
    ]);

    // Optional: Defines *what* the camera is looking at. (Smoothing 'LookAt')
    // Generally, targeting the center of the car works well, so we might just lookAt(0,0,0) constantly,
    // but a subtle track adds sophistication.
    const targetTrack = new THREE.KeyframeTrack('.quaternion', [0, 22], [
        camera.quaternion.x, camera.quaternion.y, camera.quaternion.z, camera.quaternion.w,
        camera.quaternion.x, camera.quaternion.y, camera.quaternion.z, camera.quaternion.w
    ]);
    // NOTE: Generating smooth quaternions for complex paths via Keyframes is difficult.
    // For this use case, we will rely on `.lookAt()` during the render loop rather than a Quaternion track.

    // Combine tracks into a seamless loop
    const clip = new THREE.AnimationClip('CarStudioShowcase', 22, [positionTrack]);
    const mixer = new THREE.AnimationMixer(camera);
    const action = mixer.clipAction(clip);
    action.setLoop(THREE.LoopRepeat);
    action.play();

    // Assign back to the global scope variable so the render loop can access it
    window.animationMixer = mixer;
}

// 5. Render Loop
const clock = new THREE.Clock();
const carTarget = new THREE.Vector3(0, 0.5, 0); // Focus point (front bumper/hood height)

function animate() {
    requestAnimationFrame(animate);

    if (window.animationMixer) {
        // Update the animation mixer with the time delta
        window.animationMixer.update(clock.getDelta());
    }

    // Force the camera to always focus on the same central point, 
    // smoothing the rotation even as the position track moves wildly.
    camera.lookAt(carTarget);

    renderer.render(scene, camera);
}

// Handle Window Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start the loop
animate();
    </script>
</body>
</html>
